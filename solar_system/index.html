<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 星际模拟：太阳系与邻近恒星</title>
    <link rel="stylesheet" href="styles/main.css">
    <!-- 引入 Three.js 和 OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="loading">正在生成宇宙纹理...</div>

    <div id="ui-container">
        <div class="ui-header">
            <h1 class="ui-title">星际导航系统</h1>
            <button id="ui-collapse-btn" class="ui-toggle" type="button" aria-expanded="true" aria-controls="ui-body">收起</button>
        </div>

        <div id="ui-body" class="ui-body">
            <p>鼠标左键旋转，右键平移，滚轮缩放</p>
            <p style="color:#00d2ff; font-size:0.8rem; margin-top:5px;">💡 点击天体名称查看详情</p>
            
            <div class="control-group">
                <div class="control-label">
                    <span>模拟速度</span>
                    <span id="speedValue">1.00x</span>
                </div>
                <input type="range" id="speedRange" min="0" max="2" step="0.01" value="1">
            </div>

            <!-- 导航按钮 -->
            <div class="btn-group">
                <button onclick="focusSystem('solar')">📍 太阳系 (Solar)</button>
                <button onclick="focusSystem('proxima')">📍 比邻星 (Proxima)</button>
                <button onclick="focusSystem('alpha')">📍 半人马座 α (Alpha Cen)</button>
                <button onclick="focusSystem('sirius')">📍 天狼星 (Sirius)</button>
                <button onclick="focusSystem('trappist')">📍 特拉皮斯特-1 (TRAPPIST)</button>
                <button onclick="focusSystem('cygni')">📍 天鹅座16 (16 Cygni)</button>
                <button onclick="resetView()">🔭 概览全景</button>
            </div>

            <!-- 管理员入口 -->
            <button id="admin-btn" onclick="openLogin()">🔒 管理员登录</button>

            <div style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top:10px;">
                <p style="font-size: 0.8rem;">* 天体大小、距离和方位等均已做艺术化处理以方便观测</p>
            </div>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="login-modal">
        <h3 style="color:#fff; margin-top:0;">管理员认证</h3>
        <input type="password" id="admin-pwd" placeholder="请输入密码">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="checkLogin()">确定</button>
            <button onclick="closeLogin()" style="background:#444; color:#aaa;">取消</button>
        </div>
    </div>

    <!-- 信息/编辑弹窗 -->
    <div id="blur-overlay" onclick="closeInfo()"></div>
    <div id="info-modal">
        <span class="close-btn" onclick="closeInfo()">&times;</span>
        <h2 id="modal-title">天体名称</h2>
        <div id="modal-body"></div>
    </div>

    <div id="labels-container"></div>

    <script type="module" src="scripts/app.js"></script>
</body>
</html>
