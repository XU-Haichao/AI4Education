<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="量子隧穿 - 穿越经典禁区的量子效应">
    <title>量子隧穿 | 量子探索之旅</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Marked.js & KaTeX -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="../../../css/main.css">
    <link rel="stylesheet" href="../../../css/animations.css">
    <link rel="stylesheet" href="../../../css/page.css">
</head>

<body>
    <!-- 量子背景 -->
    <canvas id="quantum-canvas"></canvas>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../../../index.html" class="nav-logo">
                <span class="logo-icon">⚛</span>
                <span class="logo-text">量子探索</span>
            </a>

            <div class="nav-page-title">
                <span class="nav-page-icon">🚇</span>
                <span class="nav-page-name">量子隧穿</span>
            </div>

            <div class="nav-actions">
                <button class="admin-btn" id="admin-btn" title="管理员模式">
                    <span class="admin-icon">⚙️</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 页面内容 -->
    <main class="page-main">
        <div class="page-container">
            <!-- 演示面板 -->
            <div class="demo-panel">
                <!-- 主演示区 -->
                <div class="demo-main-container">
                    <canvas id="tunneling-canvas" class="demo-canvas"></canvas>
                </div>

                <!-- 控制面板 -->
                <div class="control-panel">
                    <h3 class="control-title">势垒参数</h3>

                    <div class="control-group">
                        <div class="control-label">
                            <span>势垒高度 V₀</span>
                            <span class="control-value" id="barrier-height-value">1.5 E</span>
                        </div>
                        <input type="range" id="barrier-height-slider" min="0.5" max="3" value="1.5" step="0.1">
                    </div>

                    <div class="control-group">
                        <div class="control-label">
                            <span>势垒宽度 a</span>
                            <span class="control-value" id="barrier-width-value">中等</span>
                        </div>
                        <input type="range" id="barrier-width-slider" min="1" max="5" value="3" step="1">
                    </div>

                    <div class="control-group">
                        <div class="control-label">
                            <span>粒子能量 E</span>
                            <span class="control-value" id="energy-value">1.0</span>
                        </div>
                        <input type="range" id="energy-slider" min="0.3" max="2" value="1" step="0.1">
                    </div>

                    <div class="control-buttons" style="margin-top: var(--spacing-4);">
                        <button class="control-btn" id="reset-btn">重置</button>
                        <button class="control-btn primary" id="send-btn">发射粒子</button>
                    </div>
                </div>

                <!-- 结果面板 -->
                <div class="result-panel">
                    <h3 class="control-title">隧穿分析</h3>
                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-label">透射系数 T</div>
                            <div class="result-value" id="transmission-value">0.15</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">反射系数 R</div>
                            <div class="result-value" id="reflection-value">0.85</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">衰减常数 κ</div>
                            <div class="result-value" id="decay-value">0.71</div>
                            <span class="result-unit">/nm</span>
                        </div>
                        <div class="result-item">
                            <div class="result-label">隧穿概率</div>
                            <div class="result-value" id="probability-value" style="font-size: var(--text-xl);">15%
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 文档面板 -->
            <div class="doc-panel">
                <div class="doc-header">
                    <h2 class="doc-title">📖 学习内容</h2>
                    <button class="edit-btn" id="edit-btn">✏️ 编辑</button>
                </div>
                <div class="doc-content" id="doc-content"></div>

                <!-- 应用实例 -->
                <div class="application-cards">
                    <h3 style="margin-bottom: var(--spacing-3); color: var(--color-text-primary);">实际应用</h3>
                    <div class="app-card">
                        <span class="app-icon">☢️</span>
                        <div class="app-info">
                            <h4>α衰变</h4>
                            <p>α粒子通过隧穿逃离原子核</p>
                        </div>
                    </div>
                    <div class="app-card">
                        <span class="app-icon">🔬</span>
                        <div class="app-info">
                            <h4>扫描隧道显微镜</h4>
                            <p>利用隧穿电流成像原子表面</p>
                        </div>
                    </div>
                    <div class="app-card">
                        <span class="app-icon">☀️</span>
                        <div class="app-info">
                            <h4>核聚变</h4>
                            <p>太阳内部的氢核通过隧穿克服库仑势垒</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页面导航 -->
        <div class="page-nav">
            <a href="../theory-track/standard-model.html" class="page-nav-link prev">
                <span class="page-nav-arrow">←</span>
                <div>
                    <div class="page-nav-label">上一节</div>
                    <div class="page-nav-title">标准模型</div>
                </div>
            </a>
            <a href="quantum-entanglement.html" class="page-nav-link next">
                <div>
                    <div class="page-nav-label">下一节</div>
                    <div class="page-nav-title">量子纠缠</div>
                </div>
                <span class="page-nav-arrow">→</span>
            </a>
        </div>
    </main>

    <!-- 管理员模态框 -->
    <div class="modal" id="admin-modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <h2 class="modal-title">管理员登录</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-password">密码</label>
                    <input type="password" id="admin-password" placeholder="请输入管理员密码" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">登录</button>
            </form>
            <div class="admin-status" id="admin-status"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../../../js/storage.js"></script>
    <script src="../../../js/quantum-bg.js"></script>
    <script src="../../../js/app.js"></script>
    <script src="../../../js/nav-menu.js"></script>
    <script src="../../../js/simulations/modern-era/quantum-tunneling.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadPageContent('quantum-tunneling', document.getElementById('doc-content'));
        });
    </script>

    <style>
        .application-cards {
            margin-top: var(--spacing-6);
            padding: var(--spacing-4);
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: var(--radius-xl);
        }

        .app-card {
            display: flex;
            align-items: center;
            gap: var(--spacing-3);
            padding: var(--spacing-3);
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-2);
        }

        .app-card:last-child {
            margin-bottom: 0;
        }

        .app-icon {
            font-size: var(--text-2xl);
        }

        .app-info h4 {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 2px;
        }

        .app-info p {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
        }

        @media (max-width: 768px) {
            .application-cards {
                padding: var(--spacing-3);
            }
        }
    </style>
</body>

</html>
