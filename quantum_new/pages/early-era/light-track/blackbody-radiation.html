<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="黑体辐射 - 紫外灾难与普朗克的能量量子化假说">
    <title>黑体辐射 | 量子探索之旅</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Marked.js & KaTeX -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="../../../css/main.css">
    <link rel="stylesheet" href="../../../css/animations.css">
    <link rel="stylesheet" href="../../../css/page.css">
</head>

<body>
    <!-- 量子背景 -->
    <canvas id="quantum-canvas"></canvas>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../../../index.html" class="nav-logo">
                <span class="logo-icon">⚛</span>
                <span class="logo-text">量子探索</span>
            </a>

            <div class="nav-page-title">
                <span class="nav-page-icon">🔥</span>
                <span class="nav-page-name">黑体辐射</span>
            </div>

            <div class="nav-actions">
                <button class="admin-btn" id="admin-btn" title="管理员模式">
                    <span class="admin-icon">⚙️</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 页面内容 -->
    <main class="page-main">
        <div class="page-container">
            <!-- 演示面板 -->
            <div class="demo-panel">
                <!-- 双屏展示区 -->
                <div class="demo-split-container">
                    <!-- 左侧：黑体模拟 -->
                    <div class="demo-split-panel">
                        <div class="demo-split-title">黑体加热模拟</div>
                        <canvas id="blackbody-canvas" class="demo-canvas"></canvas>
                    </div>

                    <!-- 右侧：辐射曲线对比 -->
                    <div class="demo-split-panel">
                        <div class="demo-split-title">辐射强度分布曲线</div>
                        <canvas id="spectrum-canvas" class="demo-canvas"></canvas>
                    </div>
                </div>

                <!-- 控制面板 -->
                <div class="control-panel">
                    <h3 class="control-title">温度控制</h3>

                    <div class="control-group">
                        <div class="control-label">
                            <span>黑体温度 T</span>
                            <span class="control-value" id="temp-value">3000 K</span>
                        </div>
                        <input type="range" id="temp-slider" min="1000" max="10000" value="3000" step="100">
                    </div>

                    <div class="preset-buttons">
                        <span style="color: var(--color-text-secondary); font-size: var(--text-sm);">常见温度：</span>
                        <button class="preset-btn" data-temp="1500">蜡烛 1500K</button>
                        <button class="preset-btn active" data-temp="3000">白炽灯 3000K</button>
                        <button class="preset-btn" data-temp="5800">太阳 5800K</button>
                        <button class="preset-btn" data-temp="10000">蓝星 10000K</button>
                    </div>

                    <div class="control-group" style="margin-top: var(--spacing-4);">
                        <div class="control-label">
                            <span>显示曲线</span>
                        </div>
                        <div class="checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="show-planck" checked>
                                <span class="checkbox-text" style="color: #22c55e;">普朗克曲线</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="show-rayleigh" checked>
                                <span class="checkbox-text" style="color: #ef4444;">瑞利-金斯曲线</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="show-wien" checked>
                                <span class="checkbox-text" style="color: #3b82f6;">维恩曲线</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 结果面板 -->
                <div class="result-panel">
                    <h3 class="control-title">物理量</h3>
                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-label">峰值波长 λ<sub>max</sub></div>
                            <div class="result-value" id="peak-wavelength">966</div>
                            <span class="result-unit">nm</span>
                        </div>
                        <div class="result-item">
                            <div class="result-label">辐射功率 P</div>
                            <div class="result-value" id="power-value">4.6</div>
                            <span class="result-unit">MW/m²</span>
                        </div>
                        <div class="result-item">
                            <div class="result-label">维恩位移</div>
                            <div class="result-value" id="wien-constant">2.898</div>
                            <span class="result-unit">×10⁻³ m·K</span>
                        </div>
                        <div class="result-item">
                            <div class="result-label">辐射颜色</div>
                            <div class="result-value" id="color-name" style="font-size: var(--text-lg);">橙黄</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 文档面板 -->
            <div class="doc-panel">
                <div class="doc-header">
                    <h2 class="doc-title">📖 学习内容</h2>
                    <button class="edit-btn" id="edit-btn">✏️ 编辑</button>
                </div>
                <div class="doc-content" id="doc-content">
                    <!-- 内容将由 JS 渲染 -->
                </div>

                <!-- 物理学家介绍 -->
                <div class="physicist-card">
                    <img src="../../../assets/images/plank.png" alt="马克斯·普朗克" class="physicist-image">
                    <div class="physicist-info">
                        <h4>马克斯·普朗克</h4>
                        <p>Max Planck (1858-1947)</p>
                        <p class="physicist-desc">德国物理学家，1918年诺贝尔物理学奖得主。1900年提出能量量子化假说，开启了量子时代。</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页面导航 -->
        <div class="page-nav">
            <a href="../atom-track/bohr-model.html" class="page-nav-link prev">
                <span class="page-nav-arrow">←</span>
                <div>
                    <div class="page-nav-label">上一节</div>
                    <div class="page-nav-title">玻尔模型</div>
                </div>
            </a>
            <a href="photoelectric-effect.html" class="page-nav-link next">
                <div>
                    <div class="page-nav-label">下一节</div>
                    <div class="page-nav-title">光电效应</div>
                </div>
                <span class="page-nav-arrow">→</span>
            </a>
        </div>
    </main>

    <!-- 管理员模态框 -->
    <div class="modal" id="admin-modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <h2 class="modal-title">管理员登录</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-password">密码</label>
                    <input type="password" id="admin-password" placeholder="请输入管理员密码" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">登录</button>
            </form>
            <div class="admin-status" id="admin-status"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../../../js/storage.js"></script>
    <script src="../../../js/quantum-bg.js"></script>
    <script src="../../../js/app.js"></script>
    <script src="../../../js/nav-menu.js"></script>
    <script src="../../../js/simulations/early-era/blackbody-radiation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadPageContent('blackbody-radiation', document.getElementById('doc-content'));
        });
    </script>

    <style>
        /* 复选框样式 */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-4);
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--color-quantum-purple);
        }

        .checkbox-text {
            font-size: var(--text-sm);
        }

        /* 物理学家卡片样式 */
        .physicist-card {
            display: flex;
            gap: var(--spacing-4);
            margin-top: var(--spacing-6);
            padding: var(--spacing-4);
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: var(--radius-xl);
        }

        .physicist-image {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-lg);
            object-fit: cover;
            border: 2px solid var(--color-quantum-purple);
        }

        .physicist-info {
            flex: 1;
        }

        .physicist-info h4 {
            font-size: var(--text-lg);
            margin-bottom: var(--spacing-1);
            color: var(--color-text-primary);
        }

        .physicist-info p {
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-1);
        }

        .physicist-desc {
            margin-top: var(--spacing-2);
        }

        @media (max-width: 768px) {
            .physicist-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .checkbox-group {
                flex-direction: column;
            }
        }
    </style>
</body>

</html>
