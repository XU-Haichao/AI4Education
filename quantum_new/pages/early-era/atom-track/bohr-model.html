<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="玻尔原子模型 - 量子化轨道与能级跃迁">
    <title>玻尔模型 | 量子探索之旅</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Marked.js & KaTeX -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="../../../css/main.css">
    <link rel="stylesheet" href="../../../css/animations.css">
    <link rel="stylesheet" href="../../../css/page.css">
</head>

<body>
    <!-- 量子背景 -->
    <canvas id="quantum-canvas"></canvas>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../../../index.html" class="nav-logo">
                <span class="logo-icon">⚛</span>
                <span class="logo-text">量子探索</span>
            </a>

            <div class="nav-page-title">
                <span class="nav-page-icon">⚛️</span>
                <span class="nav-page-name">玻尔模型</span>
            </div>

            <div class="nav-actions">
                <button class="admin-btn" id="admin-btn" title="管理员模式">
                    <span class="admin-icon">⚙️</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 页面内容 -->
    <main class="page-main">
        <div class="page-container">
            <!-- 演示面板 -->
            <div class="demo-panel">
                <!-- 双屏展示区 -->
                <div class="demo-split-container">
                    <!-- 左侧：玻尔原子模型 -->
                    <div class="demo-split-panel">
                        <div class="demo-split-title">玻尔原子模型</div>
                        <canvas id="bohr-atom-canvas" class="demo-canvas"></canvas>
                    </div>

                    <!-- 右侧：能级图与光谱 -->
                    <div class="demo-split-panel">
                        <div class="demo-split-title">能级跃迁与氢原子光谱</div>
                        <canvas id="energy-level-canvas" class="demo-canvas"></canvas>
                    </div>
                </div>

                <!-- 控制面板 -->
                <div class="control-panel">
                    <h3 class="control-title">能级跃迁控制</h3>

                    <div class="control-group">
                        <div class="control-label">
                            <span>初始能级 n<sub>i</sub></span>
                            <span class="control-value" id="initial-level-value">3</span>
                        </div>
                        <input type="range" id="initial-level-slider" min="2" max="6" value="3" step="1">
                    </div>

                    <div class="control-group">
                        <div class="control-label">
                            <span>终态能级 n<sub>f</sub></span>
                            <span class="control-value" id="final-level-value">1</span>
                        </div>
                        <input type="range" id="final-level-slider" min="1" max="5" value="1" step="1">
                    </div>

                    <div class="preset-buttons">
                        <span style="color: var(--color-text-secondary); font-size: var(--text-sm);">光谱系列：</span>
                        <button class="preset-btn active" data-series="lyman">莱曼系 (UV)</button>
                        <button class="preset-btn" data-series="balmer">巴尔末系 (可见光)</button>
                        <button class="preset-btn" data-series="paschen">帕邢系 (IR)</button>
                    </div>

                    <div class="control-buttons" style="margin-top: var(--spacing-4);">
                        <button class="control-btn" id="reset-btn">重置</button>
                        <button class="control-btn primary" id="transition-btn">触发跃迁</button>
                    </div>
                </div>

                <!-- 结果面板 -->
                <div class="result-panel">
                    <h3 class="control-title">跃迁参数</h3>
                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-label">能量差 ΔE</div>
                            <div class="result-value" id="energy-diff">10.2</div>
                            <span class="result-unit">eV</span>
                        </div>
                        <div class="result-item">
                            <div class="result-label">光子波长 λ</div>
                            <div class="result-value" id="wavelength">121.6</div>
                            <span class="result-unit">nm</span>
                        </div>
                        <div class="result-item">
                            <div class="result-label">光子频率 ν</div>
                            <div class="result-value" id="frequency">2.47</div>
                            <span class="result-unit">×10¹⁵ Hz</span>
                        </div>
                        <div class="result-item">
                            <div class="result-label">光谱类型</div>
                            <div class="result-value" id="spectrum-type" style="font-size: var(--text-lg);">紫外线</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 文档面板 -->
            <div class="doc-panel">
                <div class="doc-header">
                    <h2 class="doc-title">📖 学习内容</h2>
                    <button class="edit-btn" id="edit-btn">✏️ 编辑</button>
                </div>
                <div class="doc-content" id="doc-content">
                    <!-- 内容将由 JS 渲染 -->
                </div>

                <!-- 物理学家介绍 -->
                <div class="physicist-card">
                    <img src="../../../assets/images/bohr.png" alt="尼尔斯·玻尔" class="physicist-image">
                    <div class="physicist-info">
                        <h4>尼尔斯·玻尔</h4>
                        <p>Niels Bohr (1885-1962)</p>
                        <p class="physicist-desc">丹麦物理学家，1922年诺贝尔物理学奖得主。提出量子化轨道模型，成功解释氢原子光谱。</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页面导航 -->
        <div class="page-nav">
            <a href="rutherford-scattering.html" class="page-nav-link prev">
                <span class="page-nav-arrow">←</span>
                <div>
                    <div class="page-nav-label">上一节</div>
                    <div class="page-nav-title">卢瑟福散射</div>
                </div>
            </a>
            <a href="../light-track/blackbody-radiation.html" class="page-nav-link next">
                <div>
                    <div class="page-nav-label">下一节</div>
                    <div class="page-nav-title">黑体辐射</div>
                </div>
                <span class="page-nav-arrow">→</span>
            </a>
        </div>
    </main>

    <!-- 管理员模态框 -->
    <div class="modal" id="admin-modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <h2 class="modal-title">管理员登录</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-password">密码</label>
                    <input type="password" id="admin-password" placeholder="请输入管理员密码" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">登录</button>
            </form>
            <div class="admin-status" id="admin-status"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../../../js/storage.js"></script>
    <script src="../../../js/quantum-bg.js"></script>
    <script src="../../../js/app.js"></script>
    <script src="../../../js/nav-menu.js"></script>
    <script src="../../../js/simulations/early-era/bohr-model.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadPageContent('bohr-model', document.getElementById('doc-content'));
        });
    </script>

    <style>
        /* 物理学家卡片样式 */
        .physicist-card {
            display: flex;
            gap: var(--spacing-4);
            margin-top: var(--spacing-6);
            padding: var(--spacing-4);
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: var(--radius-xl);
        }

        .physicist-image {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-lg);
            object-fit: cover;
            border: 2px solid var(--color-quantum-purple);
        }

        .physicist-info {
            flex: 1;
        }

        .physicist-info h4 {
            font-size: var(--text-lg);
            margin-bottom: var(--spacing-1);
            color: var(--color-text-primary);
        }

        .physicist-info p {
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-1);
        }

        .physicist-desc {
            margin-top: var(--spacing-2);
        }

        @media (max-width: 768px) {
            .physicist-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</body>

</html>
