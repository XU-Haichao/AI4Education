<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="薛定谔方程 - 量子力学的核心方程">
    <title>薛定谔方程 | 量子探索之旅</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Marked.js & KaTeX -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/animations.css">
    <link rel="stylesheet" href="../../css/page.css">
</head>

<body>
    <!-- 量子背景 -->
    <canvas id="quantum-canvas"></canvas>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../../index.html" class="nav-logo">
                <span class="logo-icon">⚛</span>
                <span class="logo-text">量子探索</span>
            </a>

            <div class="nav-page-title">
                <span class="nav-page-icon">📐</span>
                <span class="nav-page-name">薛定谔方程</span>
            </div>

            <div class="nav-actions">
                <button class="admin-btn" id="admin-btn" title="管理员模式">
                    <span class="admin-icon">⚙️</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 页面内容 -->
    <main class="page-main">
        <div class="page-container">
            <!-- 演示面板 -->
            <div class="demo-panel">
                <!-- 双屏展示区域 -->
                <div class="demo-split-container">
                    <!-- 左侧：波函数 -->
                    <div class="demo-split-panel">
                        <div class="demo-split-title">波函数 ψ(x)</div>
                        <canvas id="wave-canvas" class="demo-canvas"></canvas>
                    </div>

                    <!-- 右侧：能级图 / 概率密度 -->
                    <div class="demo-split-panel">
                        <div class="demo-split-title" id="right-panel-title">概率密度 |ψ|²</div>
                        <canvas id="probability-canvas" class="demo-canvas"></canvas>
                    </div>
                </div>

                <!-- 控制面板 -->
                <div class="control-panel">
                    <h3 class="control-title">量子系统选择</h3>

                    <div class="control-group">
                        <div class="control-label">
                            <span>势场类型</span>
                        </div>
                        <div class="preset-buttons">
                            <button class="preset-btn active" data-potential="well">无限深势阱</button>
                            <button class="preset-btn" data-potential="harmonic">量子谐振子</button>
                            <button class="preset-btn" data-potential="free">自由波包</button>

                        </div>
                    </div>

                    <!-- 定态模式控制 (势阱/谐振子) -->
                    <div class="control-group" id="stationary-controls" style="display: none;">
                        <div class="control-label">
                            <span>能级选择 n</span>
                            <span class="control-value" id="level-value">1</span>
                        </div>
                        <div class="preset-buttons" id="level-buttons">
                            <button class="preset-btn active" data-level="1">n=1 基态</button>
                            <button class="preset-btn" data-level="2">n=2</button>
                            <button class="preset-btn" data-level="3">n=3</button>
                            <button class="preset-btn" data-level="4">n=4</button>
                            <button class="preset-btn" data-level="5">n=5</button>
                        </div>
                    </div>

                    <!-- 波包模式控制 (自由/势垒) -->
                    <div class="control-group" id="wavepacket-controls">
                        <div class="control-row">
                            <div class="control-group" style="flex: 1; margin-bottom: 0;">
                                <div class="control-label">
                                    <span>初始动量 k₀</span>
                                    <span class="control-value" id="momentum-value">2.0</span>
                                </div>
                                <input type="range" id="momentum-slider" min="0.1" max="3.5" value="2.0" step="0.1">
                            </div>

                            <div class="control-group"
                                style="flex: 1; margin-bottom: 0; opacity: 0; pointer-events: none;">
                                <!-- Spacer for layout balance -->
                            </div>
                        </div>
                    </div>

                    <div class="control-buttons">
                        <button class="control-btn" id="reset-btn">重置</button>
                        <button class="control-btn" id="pause-btn">暂停</button>
                    </div>
                </div>

                <!-- 结果面板 -->
                <div class="result-panel">
                    <h3 class="control-title">物理量</h3>
                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-label">能量</div>
                            <div class="result-value" id="energy-value">E₁</div>
                            <span class="result-unit" id="energy-unit"></span>
                        </div>
                        <div class="result-item">
                            <div class="result-label">量子数</div>
                            <div class="result-value" id="quantum-number">n=1</div>
                            <span class="result-unit" id="state-desc">基态</span>
                        </div>
                        <div class="result-item">
                            <div class="result-label">归一化</div>
                            <div class="result-value" id="norm-value">1.000</div>
                            <span class="result-unit">∫|ψ|²dx</span>
                        </div>
                        <div class="result-item">
                            <div class="result-label">势场</div>
                            <div class="result-value" id="potential-name" style="font-size: var(--text-lg);">自由波包</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 文档面板 -->
            <div class="doc-panel">
                <div class="doc-header">
                    <h2 class="doc-title">📖 学习内容</h2>
                    <button class="edit-btn" id="edit-btn">✏️ 编辑</button>
                </div>
                <div class="doc-content" id="doc-content"></div>

                <!-- 物理学家介绍 -->
                <div class="physicist-card">
                    <img src="../../assets/images/schrodinger.png" alt="薛定谔" class="physicist-image">
                    <div class="physicist-info">
                        <h4>埃尔温·薛定谔</h4>
                        <p>Erwin Schrödinger (1887-1961)</p>
                        <p class="physicist-desc">奥地利物理学家，1926年建立波动力学，1933年获诺贝尔物理学奖。</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页面导航 -->
        <div class="page-nav">
            <a href="double-slit.html" class="page-nav-link prev">
                <span class="page-nav-arrow">←</span>
                <div>
                    <div class="page-nav-label">上一节</div>
                    <div class="page-nav-title">双缝干涉</div>
                </div>
            </a>
            <a href="uncertainty-principle.html" class="page-nav-link next">
                <div>
                    <div class="page-nav-label">下一节</div>
                    <div class="page-nav-title">不确定性原理</div>
                </div>
                <span class="page-nav-arrow">→</span>
            </a>
        </div>
    </main>

    <!-- 管理员模态框 -->
    <div class="modal" id="admin-modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <h2 class="modal-title">管理员登录</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-password">密码</label>
                    <input type="password" id="admin-password" placeholder="请输入管理员密码" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">登录</button>
            </form>
            <div class="admin-status" id="admin-status"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../../js/storage.js"></script>
    <script src="../../js/quantum-bg.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/nav-menu.js"></script>
    <script src="../../js/simulations/middle-era/schrodinger-equation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadPageContent('schrodinger-equation', document.getElementById('doc-content'));
        });
    </script>

    <style>
        .physicist-card {
            display: flex;
            gap: var(--spacing-4);
            margin-top: var(--spacing-6);
            padding: var(--spacing-4);
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: var(--radius-xl);
        }

        .physicist-image {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-lg);
            object-fit: cover;
            border: 2px solid var(--color-quantum-purple);
        }

        .physicist-info {
            flex: 1;
        }

        .physicist-info h4 {
            font-size: var(--text-lg);
            margin-bottom: var(--spacing-1);
            color: var(--color-text-primary);
        }

        .physicist-info p {
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-1);
        }

        @media (max-width: 768px) {
            .physicist-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</body>

</html>
