<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="德布罗意波 - 物质波假说与波粒二象性">
    <title>德布罗意波 | 量子探索之旅</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Marked.js & KaTeX -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/animations.css">
    <link rel="stylesheet" href="../../css/page.css">
</head>

<body>
    <!-- 量子背景 -->
    <canvas id="quantum-canvas"></canvas>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../../index.html" class="nav-logo">
                <span class="logo-icon">⚛</span>
                <span class="logo-text">量子探索</span>
            </a>

            <div class="nav-page-title">
                <span class="nav-page-icon">🌊</span>
                <span class="nav-page-name">德布罗意波</span>
            </div>

            <div class="nav-actions">
                <button class="admin-btn" id="admin-btn" title="管理员模式">
                    <span class="admin-icon">⚙️</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 页面内容 -->
    <main class="page-main">
        <div class="page-container">
            <!-- 演示面板 -->
            <div class="demo-panel">
                <div class="demo-canvas-container" style="height: 320px; position: relative;">
                    <canvas id="de-broglie-canvas" class="demo-canvas" style="width: 100%; height: 100%;"></canvas>
                </div>

                <!-- 控制面板 -->
                <div class="control-panel">
                    <h3 class="control-title">实验参数</h3>

                    <div class="control-group">
                        <div class="control-label">
                            <span>粒子类型</span>
                            <span class="control-value" id="particle-name">电子</span>
                        </div>
                        <div class="preset-buttons">
                            <button class="preset-btn active" data-preset="electron">电子</button>
                            <button class="preset-btn" data-preset="proton">质子</button>
                            <button class="preset-btn" data-preset="c60">富勒烯</button>
                            <button class="preset-btn" data-preset="dust">星际尘埃</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="control-label">
                            <span>粒子质量 m</span>
                            <span class="control-value" id="mass-log-val">9.1e-31 kg</span>
                        </div>
                        <input type="range" id="mass-slider" min="-31" max="-17" value="-31" step="0.1">
                    </div>

                    <div class="control-group">
                        <div class="control-label">
                            <span>粒子速度 v</span>
                            <span class="control-value" id="velocity-val">2.0 km/s</span>
                        </div>
                        <input type="range" id="velocity-slider" min="1" max="100" value="20" step="0.1">
                    </div>

                </div>

                <!-- 结果面板 -->
                <div class="result-panel">
                    <h3 class="control-title">测量数据</h3>
                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-label">质量 m</div>
                            <div class="result-value" id="res-mass">9.11</div>
                            <span class="result-unit">kg</span>
                        </div>
                        <div class="result-item">
                            <div class="result-label">德布罗意波长 λ</div>
                            <div class="result-value" id="res-wavelength">1.2</div>
                            <span class="result-unit">m</span>
                        </div>
                        <div class="result-item">
                            <div class="result-label">波动性显著度</div>
                            <div class="result-value" id="res-scale" style="font-size: var(--text-md);">显著</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 文档面板 -->
            <div class="doc-panel">
                <div class="doc-header">
                    <h2 class="doc-title">📖 学习内容</h2>
                    <button class="edit-btn" id="edit-btn">✏️ 编辑</button>
                </div>
                <div class="doc-content" id="doc-content"></div>

                <!-- 物理学家介绍 -->
                <div class="physicist-card">
                    <img src="../../assets/images/de_broglie.png" alt="路易·德布罗意" class="physicist-image">
                    <div class="physicist-info">
                        <h4>路易·德布罗意</h4>
                        <p>Louis de Broglie (1892-1987)</p>
                        <p class="physicist-desc">法国物理学家，因发现电子的波动性获1929年诺贝尔物理学奖。</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页面导航 -->
        <div class="page-nav">
            <a href="../early-era/light-track/compton-scattering.html" class="page-nav-link prev">
                <span class="page-nav-arrow">←</span>
                <div>
                    <div class="page-nav-label">上一阶段</div>
                    <div class="page-nav-title">康普顿散射</div>
                </div>
            </a>
            <a href="double-slit.html" class="page-nav-link next">
                <div>
                    <div class="page-nav-label">下一节</div>
                    <div class="page-nav-title">双缝干涉</div>
                </div>
                <span class="page-nav-arrow">→</span>
            </a>
        </div>
    </main>

    <!-- 管理员模态框 -->
    <div class="modal" id="admin-modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <h2 class="modal-title">管理员登录</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-password">密码</label>
                    <input type="password" id="admin-password" placeholder="请输入管理员密码" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">登录</button>
            </form>
            <div class="admin-status" id="admin-status"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../../js/storage.js"></script>
    <script src="../../js/quantum-bg.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/nav-menu.js"></script>
    <script src="../../js/simulations/middle-era/de-broglie-wave.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadPageContent('de-broglie-wave', document.getElementById('doc-content'));
        });
    </script>

    <style>
        /* 物理学家卡片样式（与站内其他页面保持一致） */
        .physicist-card {
            display: flex;
            gap: var(--spacing-4);
            margin-top: var(--spacing-6);
            padding: var(--spacing-4);
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: var(--radius-xl);
        }

        .physicist-image {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-lg);
            object-fit: cover;
            border: 2px solid var(--color-quantum-purple);
        }

        .physicist-info {
            flex: 1;
        }

        .physicist-info h4 {
            font-size: var(--text-lg);
            margin-bottom: var(--spacing-1);
            color: var(--color-text-primary);
        }

        .physicist-info p {
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-1);
        }

        .physicist-desc {
            margin-top: var(--spacing-2);
        }

        @media (max-width: 768px) {
            .physicist-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</body>

</html>
