<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="双缝干涉实验 - 量子力学最深刻的谜团">
    <title>双缝干涉 | 量子探索之旅</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Marked.js & KaTeX -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/animations.css">
    <link rel="stylesheet" href="../../css/page.css">
</head>

<body>
    <!-- 量子背景 -->
    <canvas id="quantum-canvas"></canvas>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../../index.html" class="nav-logo">
                <span class="logo-icon">⚛</span>
                <span class="logo-text">量子探索</span>
            </a>

            <div class="nav-page-title">
                <span class="nav-page-icon">🎯</span>
                <span class="nav-page-name">双缝干涉</span>
            </div>

            <div class="nav-actions">
                <button class="admin-btn" id="admin-btn" title="管理员模式">
                    <span class="admin-icon">⚙️</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 页面内容 -->
    <main class="page-main">
        <div class="page-container">
            <!-- 演示面板 -->
            <div class="demo-panel">
                <!-- 全宽实验画布 -->
                <div class="demo-full-panel">
                    <div class="demo-split-title">双缝干涉实验</div>
                    <canvas id="double-slit-canvas" class="demo-canvas" style="height: 350px;"></canvas>
                </div>

                <!-- 控制面板 -->
                <div class="control-panel">
                    <h3 class="control-title">实验控制</h3>

                    <div class="control-row">
                        <div class="control-group">
                            <div class="control-label">
                                <span>发射模式</span>
                            </div>
                            <div class="preset-buttons">
                                <button class="preset-btn active" data-mode="wave">大量</button>
                                <button class="preset-btn" data-mode="single">少量</button>
                            </div>
                        </div>

                        <div class="control-group">
                            <div class="control-label">
                                <span>探测器</span>
                            </div>
                            <div class="preset-buttons">
                                <button class="preset-btn active" data-detector="off">关闭</button>
                                <button class="preset-btn" data-detector="on">开启 (观察哪条缝)</button>
                            </div>
                        </div>
                    </div>



                    <div class="control-buttons">
                        <button class="control-btn" id="reset-btn">重置屏幕</button>
                        <button class="control-btn" id="pause-btn">暂停</button>
                        <button class="control-btn primary" id="emit-btn">发射粒子</button>
                    </div>
                </div>

            </div>

            <!-- 文档面板 -->
            <div class="doc-panel">
                <div class="doc-header">
                    <h2 class="doc-title">📖 学习内容</h2>
                    <button class="edit-btn" id="edit-btn">✏️ 编辑</button>
                </div>
                <div class="doc-content" id="doc-content"></div>

                <!-- 戴维森-盖尔末实验 -->
                <div class="physicist-card">
                    <img src="../../assets/images/davisson_germer.png" alt="戴维森和盖尔末" class="physicist-image">
                    <div class="physicist-info">
                        <h4>戴维森和盖尔末</h4>
                        <p>Davisson & Germer</p>
                        <p class="physicist-desc">1927年电子衍射实验验证了电子的波动性，为物质波假说提供了关键实验证据。</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页面导航 -->
        <div class="page-nav">
            <a href="de-broglie-wave.html" class="page-nav-link prev">
                <span class="page-nav-arrow">←</span>
                <div>
                    <div class="page-nav-label">上一节</div>
                    <div class="page-nav-title">德布罗意波</div>
                </div>
            </a>
            <a href="schrodinger-equation.html" class="page-nav-link next">
                <div>
                    <div class="page-nav-label">下一节</div>
                    <div class="page-nav-title">薛定谔方程</div>
                </div>
                <span class="page-nav-arrow">→</span>
            </a>
        </div>
    </main>

    <!-- 管理员模态框 -->
    <div class="modal" id="admin-modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <h2 class="modal-title">管理员登录</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-password">密码</label>
                    <input type="password" id="admin-password" placeholder="请输入管理员密码" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">登录</button>
            </form>
            <div class="admin-status" id="admin-status"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../../js/storage.js"></script>
    <script src="../../js/quantum-bg.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/nav-menu.js"></script>
    <script src="../../js/simulations/middle-era/double-slit.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadPageContent('double-slit', document.getElementById('doc-content'));
        });
    </script>

    <style>
        .demo-full-panel {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-4);
        }

        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-4);
        }

        .physicist-card {
            display: flex;
            gap: var(--spacing-4);
            margin-top: var(--spacing-6);
            padding: var(--spacing-4);
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: var(--radius-xl);
        }

        .physicist-image {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-lg);
            object-fit: cover;
            border: 2px solid var(--color-quantum-purple);
        }

        .physicist-info {
            flex: 1;
        }

        .physicist-info h4 {
            font-size: var(--text-lg);
            margin-bottom: var(--spacing-1);
            color: var(--color-text-primary);
        }

        .physicist-info p {
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-1);
        }

        @media (max-width: 768px) {
            .control-row {
                grid-template-columns: 1fr;
            }

            .physicist-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</body>

</html>
